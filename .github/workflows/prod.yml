name: Production Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO_NAME: flask-app
  CLUSTER_NAME: flask-app-production-cluster
  SERVICE_NAME: flask-app-production-service
  TASK_FAMILY: flask-app-production-task
  CONTAINER_NAME: flask-app
  LOG_GROUP: /ecs/flask-app-production
  SG_NAME: flask-app-production-sg
  EXECUTION_ROLE_NAME: ecsTaskExecutionRole
  TASK_ROLE_NAME: ecsTaskRole-flask-app
  APP_PORT: "5000"
  TASK_CPU: "512"
  TASK_MEMORY: "1024"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    # environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      # ════════════════════════════════════════════════════════════
      #  INFRASTRUCTURE — idempotent
      # ════════════════════════════════════════════════════════════

      - name: Ensure ECR Repository
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" > /dev/null 2>&1 \
          || aws ecr create-repository \
               --repository-name "$ECR_REPO_NAME" \
               --image-scanning-configuration scanOnPush=true

      - name: Ensure ECS Cluster
        run: |
          STATUS=$(aws ecs describe-clusters \
            --clusters "$CLUSTER_NAME" \
            --query 'clusters[0].status' --output text 2>/dev/null)
          if [ "$STATUS" != "ACTIVE" ]; then
            aws ecs create-cluster \
              --cluster-name "$CLUSTER_NAME" \
              --capacity-providers FARGATE \
              --default-capacity-provider-strategy capacityProvider=FARGATE,weight=1
          fi

      - name: Ensure IAM Roles
        run: |
          TRUST_POLICY='{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Service": "ecs-tasks.amazonaws.com" },
              "Action": "sts:AssumeRole"
            }]
          }'
          if ! aws iam get-role --role-name "$EXECUTION_ROLE_NAME" > /dev/null 2>&1; then
            aws iam create-role --role-name "$EXECUTION_ROLE_NAME" --assume-role-policy-document "$TRUST_POLICY"
            aws iam attach-role-policy --role-name "$EXECUTION_ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
          fi
          if ! aws iam get-role --role-name "$TASK_ROLE_NAME" > /dev/null 2>&1; then
            aws iam create-role --role-name "$TASK_ROLE_NAME" --assume-role-policy-document "$TRUST_POLICY"
          fi

      - name: Ensure CloudWatch Log Group
        run: |
          aws logs describe-log-groups \
            --log-group-name-prefix "$LOG_GROUP" \
            --query "logGroups[?logGroupName=='$LOG_GROUP'].logGroupName" \
            --output text | grep -q "$LOG_GROUP" \
          || {
            aws logs create-log-group --log-group-name "$LOG_GROUP"
            aws logs put-retention-policy --log-group-name "$LOG_GROUP" --retention-in-days 30
          }

      - name: Ensure Security Group
        id: sg
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNET_CSV=$(aws ec2 describe-subnets \
            --filters Name=vpc-id,Values=$VPC_ID \
            --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')
          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "subnet_ids=$SUBNET_CSV" >> "$GITHUB_OUTPUT"

          EXISTING_SG=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values="$SG_NAME" Name=vpc-id,Values="$VPC_ID" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null)
          if [ "$EXISTING_SG" != "None" ] && [ -n "$EXISTING_SG" ]; then
            echo "sg_id=$EXISTING_SG" >> "$GITHUB_OUTPUT"
          else
            SG_ID=$(aws ec2 create-security-group \
              --group-name "$SG_NAME" --description "SG for flask-app production" \
              --vpc-id "$VPC_ID" --query 'GroupId' --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" --protocol tcp --port "$APP_PORT" --cidr 0.0.0.0/0
            echo "sg_id=$SG_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Task Definition
        env:
          ACCOUNT_ID: ${{ steps.aws-account.outputs.id }}
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" > /dev/null 2>&1 \
          || aws ecs register-task-definition \
               --family "$TASK_FAMILY" \
               --network-mode awsvpc \
               --requires-compatibilities FARGATE \
               --cpu "$TASK_CPU" \
               --memory "$TASK_MEMORY" \
               --execution-role-arn "arn:aws:iam::${ACCOUNT_ID}:role/${EXECUTION_ROLE_NAME}" \
               --task-role-arn "arn:aws:iam::${ACCOUNT_ID}:role/${TASK_ROLE_NAME}" \
               --container-definitions "[{
                 \"name\": \"${CONTAINER_NAME}\",
                 \"image\": \"${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}:latest\",
                 \"essential\": true,
                 \"portMappings\": [{\"containerPort\": ${APP_PORT}, \"protocol\": \"tcp\"}],
                 \"logConfiguration\": {
                   \"logDriver\": \"awslogs\",
                   \"options\": {
                     \"awslogs-group\": \"${LOG_GROUP}\",
                     \"awslogs-region\": \"${AWS_REGION}\",
                     \"awslogs-stream-prefix\": \"ecs\"
                   }
                 },
                 \"healthCheck\": {
                   \"command\": [\"CMD-SHELL\", \"curl -f http://localhost:${APP_PORT}/ || exit 1\"],
                   \"interval\": 30, \"timeout\": 5, \"retries\": 3, \"startPeriod\": 60
                 }
               }]"

      - name: Ensure ECS Service
        run: |
          ACTIVE=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" \
            --query 'services[?status==`ACTIVE`].serviceName' --output text 2>/dev/null)
          if [ "$ACTIVE" != "$SERVICE_NAME" ]; then
            aws ecs create-service \
              --cluster "$CLUSTER_NAME" \
              --service-name "$SERVICE_NAME" \
              --task-definition "$TASK_FAMILY" \
              --desired-count 1 \
              --launch-type FARGATE \
              --deployment-configuration "minimumHealthyPercent=100,maximumPercent=200" \
              --network-configuration "awsvpcConfiguration={
                subnets=[${{ steps.sg.outputs.subnet_ids }}],
                securityGroups=[${{ steps.sg.outputs.sg_id }}],
                assignPublicIp=ENABLED
              }"
          fi

      # ════════════════════════════════════════════════════════════
      #  BUILD + DEPLOY
      # ════════════════════════════════════════════════════════════

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        env:
          IMAGE_URI: ${{ steps.aws-account.outputs.id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-app
        run: |
          docker build -t "${IMAGE_URI}:${GITHUB_SHA}" .
          docker tag "${IMAGE_URI}:${GITHUB_SHA}" "${IMAGE_URI}:latest-production"
          docker push "${IMAGE_URI}:${GITHUB_SHA}"
          docker push "${IMAGE_URI}:latest-production"

      - name: Get Current Task Definition
        id: current-task
        run: |
          CURRENT_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" \
            --query 'services[0].taskDefinition' --output text)
          echo "task_def_arn=$CURRENT_ARN" >> "$GITHUB_OUTPUT"

      - name: Register New Task Definition
        id: new-task
        env:
          IMAGE_URI: ${{ steps.aws-account.outputs.id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-app:${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" --query 'taskDefinition')
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE_URI" --arg CONTAINER "$CONTAINER_NAME" \
            '.containerDefinitions |= map(
              if .name == $CONTAINER then .image = $IMAGE else . end
            )')
          CLEANED=$(echo "$NEW_TASK_DEF" | jq 'del(
            .taskDefinitionArn, .revision, .status,
            .requiresAttributes, .compatibilities,
            .registeredAt, .registeredBy
          )')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$CLEANED" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "new_task_def_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" \
            --task-definition "${{ steps.new-task.outputs.new_task_def_arn }}" \
            --force-new-deployment

      - name: Wait for Service Stability
        id: wait-stable
        run: |
          if aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"; then
            echo "stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rollback on Failure
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" \
            --task-definition "${{ steps.current-task.outputs.task_def_arn }}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

      - name: Fail if Deployment Unstable
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          echo "::error::Production deployment failed and was rolled back."
          exit 1
