name: Production Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO_NAME: flask-app
  CLUSTER_NAME: flask-app-production-cluster
  SERVICE_NAME: flask-app-production-service
  TASK_FAMILY: flask-app-production-task
  CONTAINER_NAME: flask-app

permissions:
  id-token: write
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    # environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPO_NAME" > /dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "$ECR_REPO_NAME" \
            --image-scanning-configuration scanOnPush=true

      - name: Build and Push to ECR
        env:
          IMAGE_URI: ${{ steps.aws-account.outputs.id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-app
        run: |
          docker build -t "${IMAGE_URI}:${GITHUB_SHA}" .
          docker tag "${IMAGE_URI}:${GITHUB_SHA}" "${IMAGE_URI}:latest-production"
          docker push "${IMAGE_URI}:${GITHUB_SHA}"
          docker push "${IMAGE_URI}:latest-production"

      - name: Get Current Task Definition
        id: current-task
        run: |
          CURRENT_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task_def_arn=$CURRENT_ARN" >> "$GITHUB_OUTPUT"
          echo "Captured current task definition: $CURRENT_ARN"

      - name: Register New Task Definition
        id: new-task
        env:
          IMAGE_URI: ${{ steps.aws-account.outputs.id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-app:${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition')

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE_URI" \
            --arg CONTAINER "$CONTAINER_NAME" \
            '.containerDefinitions |= map(
              if .name == $CONTAINER then .image = $IMAGE else . end
            )')

          CLEANED=$(echo "$NEW_TASK_DEF" | jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$CLEANED" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "new_task_def_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered new task definition: $NEW_ARN"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "${{ steps.new-task.outputs.new_task_def_arn }}" \
            --force-new-deployment

      - name: Wait for Service Stability
        id: wait-stable
        run: |
          echo "Waiting for ECS service to stabilize..."
          if aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"; then
            echo "stable=true" >> "$GITHUB_OUTPUT"
            echo "Service is stable with new deployment."
          else
            echo "stable=false" >> "$GITHUB_OUTPUT"
            echo "Service did NOT stabilize. Will rollback."
          fi

      - name: Rollback on Failure
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          echo "Rolling back to: ${{ steps.current-task.outputs.task_def_arn }}"
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "${{ steps.current-task.outputs.task_def_arn }}" \
            --force-new-deployment

          echo "Waiting for rollback to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"
          echo "Rollback complete."

      - name: Fail if Deployment Unstable
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          echo "::error::Production deployment failed and was rolled back."
          exit 1
