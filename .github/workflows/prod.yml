name: PROD Pipeline

on:

  push:

    branches:

      - main

jobs:

  prod:

    runs-on: self-hosted

    environment:

      name: production

    steps:

    - uses: actions/checkout@v4

    - name: GitLeaks Scan

      uses: gitleaks/gitleaks-action@v2

    - name: Verify Python

      run: |

        python3 --version

        pip3 --version

    - name: Activate Virtual Env

      run: |

        source ~/github-runner-venv/bin/activate

        python --version

        pip install -r requirements.txt
    # - name: Run Tests

    #   run: |

    #     python3 -m pytest \
    #     --cov=. \
    #     --cov-report=xml

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    - name: Trivy Scan

      run: |

        trivy fs .

    - name: Build Docker

      run: |

        docker build \
        -t myapp:prod-${{ github.sha }} .

    - name: Scan Docker Image

      run: |

        trivy image myapp:prod-${{ github.sha }}

    - name: Configure AWS Credentials

      uses: aws-actions/configure-aws-credentials@v4

      with:

        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}

        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login ECR

      uses: aws-actions/amazon-ecr-login@v2

    - name: Push Image

      run: |

        docker tag myapp:prod-${{ github.sha }} \
        ${{ secrets.ECR_REPOSITORY }}:prod-${{ github.sha }}

        docker push \
        ${{ secrets.ECR_REPOSITORY }}:prod-${{ github.sha }}

    - name: Configure kubeconfig

      run: |

        echo "${{ secrets.KUBECONFIG_PROD }}" > kubeconfig

        export KUBECONFIG=$PWD/kubeconfig

    - name: Deploy PROD

      run: |

        export KUBECONFIG=$PWD/kubeconfig

        kubectl apply -f k8s/prod/
