name: Pull Request Validation

on:
  pull_request:
    branches:
      - qa
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: pip install -r requirements.txt

      - name: Lint Check
        run: pylint app.py

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Unit Tests
        run: pytest

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  comment:
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Post Success Comment
        if: needs.validate.result == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ✅ Pipeline Validation Passed',
                '',
                'All checks completed successfully:',
                '- Lint check (pylint)',
                '- Secret scanning (Gitleaks)',
                '- Unit tests (pytest)',
                '- SonarQube analysis',
                '',
                `**Commit:** \`${context.sha.substring(0, 7)}\``,
                `**Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              ].join('\n')
            });

      - name: Post Failure Comment
        if: needs.validate.result == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Pipeline Validation Failed',
                '',
                'One or more checks did not pass. Please review the logs and fix the issues before merging.',
                '',
                `**Commit:** \`${context.sha.substring(0, 7)}\``,
                `**Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              ].join('\n')
            });

      - name: Fail if Validation Failed
        if: needs.validate.result == 'failure'
        run: exit 1
